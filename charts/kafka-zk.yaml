---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: zk-prod
  name: zk-prod-headless
spec:
  clusterIP: None
  ports:
    - name: client
      port: 2181
      targetPort: 2181
    - name: follower
      port: 2888
      targetPort: 2888
    - name: leader-election
      port: 3888
      targetPort: 3888
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: zk-prod
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: zk-prod
  name: zk-prod-client
spec:
  ports:
    - name: client
      port: 2181
      targetPort: 2181
  selector:
    app.kubernetes.io/name: zk-prod
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: zk-prod
  name: zk-prod
spec:
  minReadySeconds: &mrs 10
  podManagementPolicy: OrderedReady # OrderedReady[ruok/imok] Parallel[stat/Mode] for readinessProbe
  replicas: 3 # and REPLICAS
  selector:
    matchLabels:
      app.kubernetes.io/name: zk-prod
  serviceName: &dm zk-prod-headless
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zk-prod
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: zk-prod
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - command:
            - sh
            - -ec
            - |
              echo $((${POD_NAME##*-} + 1)) >/data/myid
              until getent ahosts "$POD_NAME.$DOMAIN.$POD_NAMESPACE.svc" | grep "$(hostname -i)"; do sleep 3; done >/dev/null
              cat <<EOF >conf/zoo.cfg
              tickTime=2000
              initLimit=10
              syncLimit=5
              dataDir=/data
              dataLogDir=/data/log
              skipACL=yes
              maxClientCnxns=0
              quorumListenOnAllIPs=true
              autopurge.snapRetainCount=3
              autopurge.purgeInterval=1
              fsync.warningthresholdms=500
              standaloneEnabled=false
              4lw.commands.whitelist=srvr,stat,mntr,conf,ruok,cons,isro
              globalOutstandingLimit=1000
              EOF
              for i in $(seq "$REPLICAS"); do echo "server.$i=${POD_NAME%-*}-$((i - 1)).$DOMAIN.$POD_NAMESPACE.svc:2888:3888:participant;2181"; done >>conf/zoo.cfg
              exec zkServer.sh start-foreground
          env:
            - name: REPLICAS
              value: "3"
            - name: JVMFLAGS
              value: |-
                -Dfile.encoding=UTF-8
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=75.0
                -XX:InitialRAMPercentage=75.0
                -XX:MinRAMPercentage=50.0
            - name: SERVER_JVMFLAGS
              value: |-
                -server
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=20
                -XX:InitiatingHeapOccupancyPercent=35
                -XX:+ExplicitGCInvokesConcurrent
                -XX:MaxInlineLevel=15
                -Djava.awt.headless=true
                -Dzookeeper.serverCnxnFactory=org.apache.zookeeper.server.NettyServerCnxnFactory
                -Dzookeeper.leaderServes=yes
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: DOMAIN
              value: *dm
          image: muicoder/zookeeper:3.8.5
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    sleep 9
                    zkServer.sh stop || exit
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - echo ruok | nc -w 3 localhost 2181 | grep imok
            failureThreshold: 10
            timeoutSeconds: 3
          name: zookeeper
          ports:
            - containerPort: 2181
              name: client
            - containerPort: 2888
              name: follower
            - containerPort: 3888
              name: leader-election
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - echo ruok | nc -w 3 localhost 2181 | grep imok
          resources:
            limits:
              cpu: "4"
              memory: 8Gi
            requests:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - echo ruok | nc -w 3 localhost 2181 | grep imok
            failureThreshold: 10
            initialDelaySeconds: *mrs
            timeoutSeconds: 3
          volumeMounts:
            - mountPath: /data
              name: data
      enableServiceLinks: false
      nodeSelector:
        zookeeper: ""
      terminationGracePeriodSeconds: 120
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        # storageClassName: ssd
        resources:
          requests:
            storage: 20Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zk-prod
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zk-prod
