---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: kafka-prod
  name: kafka-prod-headless
spec:
  clusterIP: None
  ports:
    - name: client
      port: 9092
      targetPort: 9092
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka-prod
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: kafka-prod
  name: kafka-prod-client
spec:
  ports:
    - name: client
      port: 9092
      targetPort: 9092
  selector:
    app.kubernetes.io/name: kafka-prod
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: kafka-prod
  name: kafka-prod
spec:
  minReadySeconds: &mrs 30
  podManagementPolicy: OrderedReady
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-prod
  serviceName: &dm kafka-prod-headless
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-prod
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kafka-prod
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - command:
            - sh
            - -ec
            - |
              CONF_FILE="config/server.properties"
              cp "$CONF_FILE" "$ENV_LOG_DIRS"
              echo "############################# $DOMAIN.$POD_NAMESPACE.svc #############################" >>"$CONF_FILE"
              export ENV_BROKER_ID="${POD_NAME##*-}"
              export ENV_INTER_BROKER_LISTENER_NAME=PLAINTEXT
              export ENV_LISTENERS=PLAINTEXT://:9092
              export ENV_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
              export ENV_ADVERTISED_LISTENERS=PLAINTEXT://$POD_NAME.$DOMAIN.$POD_NAMESPACE.svc:9092
              printenv | grep "^ENV_" | sort -u | while IFS= read -r line; do
                  key="${line%%=*}"
                  val="${line#*=}"
                  prop=$(echo "${key#ENV_}" | tr '[:upper:]' '[:lower:]' | tr '_' '.')
                  if grep -q "^[[:space:]]*${prop}[[:space:]]*=" "$CONF_FILE"; then
                      sed -i "s|^[[:space:]]*${prop}[[:space:]]*=.*|$prop=$val|" "$CONF_FILE"
                  else
                      echo "$prop=$val" >>"$CONF_FILE"
                  fi
              done
              cat <<EOF | sort -u >>"$CONF_FILE"
              auto.create.topics.enable=true
              delete.topic.enable=false
              unclean.leader.election.enable=false
              group.initial.rebalance.delay.ms=5000
              num.partitions=15
              default.replication.factor=3
              min.insync.replicas=2
              num.io.threads=8
              num.network.threads=5
              num.replica.fetchers=3
              log.cleaner.threads=2
              log.retention.hours=120
              message.max.bytes=10495760
              replica.fetch.max.bytes=15728640
              socket.send.buffer.bytes=1049576
              socket.receive.buffer.bytes=1049576
              transaction.state.log.num.partitions=30
              transaction.state.log.replication.factor=3
              transaction.state.log.min.isr=2
              offsets.topic.num.partitions=30
              offsets.topic.replication.factor=3
              EOF
              until echo stat | nc -w 3 "${ENV_ZOOKEEPER_CONNECT%:*}" "${ENV_ZOOKEEPER_CONNECT#*:}" | grep "Mode: leader"; do sleep 1; done
              exec kafka-server-start.sh "$CONF_FILE"
          env:
            - name: ENV_LOG_DIRS
              value: /data
            - name: ENV_ZOOKEEPER_CONNECT
              value: zk-prod-client:2181
            - name: KAFKA_OPTS
              value: |-
                -Dfile.encoding=UTF-8
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=60.0
                -XX:InitialRAMPercentage=60.0
                -XX:MinRAMPercentage=50.0
            - name: KAFKA_JVM_PERFORMANCE_OPTS
              value: |-
                -server
                -XX:+UseG1GC
                -XX:MaxGCPauseMillis=20
                -XX:InitiatingHeapOccupancyPercent=35
                -XX:+ExplicitGCInvokesConcurrent
                -XX:MaxInlineLevel=15
                -Djava.awt.headless=true
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: DOMAIN
              value: *dm
          image: muicoder/kafka:2.12-2.8.2
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    sleep 9
                    kafka-server-stop.sh || true
          livenessProbe:
            tcpSocket:
              port: client
          name: kafka
          ports:
            - containerPort: 9092
              name: client
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - exec kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "8"
              memory: 16Gi
            requests:
              cpu: "4"
              memory: 8Gi
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - exec kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1
            failureThreshold: 20
            initialDelaySeconds: *mrs
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /data
              name: data
      enableServiceLinks: false
      nodeSelector:
        kafka: ""
      terminationGracePeriodSeconds: 120
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        # storageClassName: hdd
        resources:
          requests:
            storage: 100Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kafka-prod
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-prod
